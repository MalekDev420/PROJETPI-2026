version: '3.8'

services:
  # Votre Backend Spring Boot
  backend:
    image: malekdev80/mon-backend-spring:latest
    container_name: backend-service
    ports:
      - "3000:3000" # Mapping correct: port 3000 de la machine vers 3000 du conteneur
    networks:
      - monitor-net
    restart: always

  # Prometheus
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks:
      - monitor-net
    restart: always

  # Alertmanager
  alertmanager:
    image: prom/alertmanager:latest
    container_name: alertmanager
    ports:
      - "9093:9093"
    volumes:
      - ./alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    networks:
      - monitor-net
    restart: always

  # Grafana
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3001:3000" 
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - monitor-net
    restart: always

networks:
  monitor-net:
    driver: bridge

volumes:
  prometheus_data:
  grafana_data:
services:
  # Base de données intégrée (remplace XAMPP)
  db:
    image: mysql:8.0
    container_name: mysql-db
    environment:
      - MYSQL_DATABASE=gestion_missions_spring
      - MYSQL_ROOT_PASSWORD=root
    ports:
      - "3306:3306"
    networks:
      - monitor-net
    restart: always

  # Ton Backend mis à jour
  backend:
    image: malekdev80/mon-backend-spring:latest
    container_name: backend-service
    ports:
      - "3000:3000"
    environment:
      # On pointe vers le service 'db' défini ci-dessus
      - SPRING_DATASOURCE_URL=jdbc:mysql://db:3306/gestion_missions_spring?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=root
    networks:
      - monitor-net
    depends_on:
      - db
    restart: always

  # Le reste de tes services (Prometheus, Grafana, Alertmanager) reste identique
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks:
      - monitor-net
    restart: always

  alertmanager:
    image: prom/alertmanager:latest
    container_name: alertmanager
    ports:
      - "9093:9093"
    volumes:
      - ./alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    networks:
      - monitor-net
    restart: always

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3001:3000" 
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - monitor-net
    restart: always

networks:
  monitor-net:
    driver: bridge

volumes:
  prometheus_data:
  grafana_data: